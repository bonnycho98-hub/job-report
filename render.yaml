services:
  - type: web
    name: job-crawler
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false  # Render 대시보드에서 직접 입력
      - key: PYTHON_VERSION
        value: "3.11"
