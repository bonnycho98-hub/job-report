name: Daily Job Crawl & Notify

on:
  schedule:
    # 매일 UTC 00:00 (한국 시간 오전 9시) 실행
    - cron: '0 0 * * *'
  workflow_dispatch:
    # 수동 실행 가능하게 설정

jobs:
  crawl-and-notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Crawler & Update Database
        env:
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. 크롤링 수행 (리덕스로 기존 데이터 업데이트 가능하도록)
          # (현재 구조상 리포트 생성을 위해 db 파일이 레포에 있어야 함)
          python3 backend/main.py --trigger

      - name: Generate HTML Report
        env:
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: |
          # 2. 리포트 생성 (exporter.py 실행)
          # HTML이 deploy/ 디렉토리에 생성됨
          python3 -c "from backend.database import SessionLocal; from backend.exporter import export_to_html; from datetime import datetime; db=SessionLocal(); now=datetime.utcnow(); export_to_html(db, now.year, now.isocalendar()[1]); db.close()"

      - name: Send Telegram Notification
        env:
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 3. 텔레그램 알림 전송
          python3 scripts/notify_telegram.py

      - name: Commit and Push changes
        run: |
          # 4. DB 업데이트 및 생성된 HTML을 GitHub에 커밋 & 푸시
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/jobs.db deploy/reports/ output/
          git commit -m "📋 Daily Job Report Update ($(date +'%Y-%m-%d'))" || echo "No changes to commit"
          git push origin main
