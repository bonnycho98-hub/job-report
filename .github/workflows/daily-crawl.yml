name: Daily Job Crawl & Notify

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  crawl-and-notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crawler & Update Database
        env:
          PYTHONPATH: .
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. 크롤링 및 DB 업데이트 (PYTHONPATH 추가 필수)
          python3 backend/main.py --trigger

      - name: Generate HTML Report
        env:
          PYTHONPATH: .
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: |
          # 2. 리포트 생성
          python3 -c "import os; import sys; sys.path.insert(0, os.getcwd()); from backend.database import SessionLocal; from backend.exporter import export_to_html; from datetime import datetime; db=SessionLocal(); now=datetime.utcnow(); export_to_html(db, now.year, now.isocalendar()[1]); db.close()"

      - name: Send Telegram Notification
        env:
          PYTHONPATH: .
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 3. 텔레그램 알림 전송 (id 자동 탐색 결과 반영)
          python3 scripts/notify_telegram.py

      - name: Commit and Push changes
        run: |
          # 4. 업데이트된 DB 및 HTML 영구 저장
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add data/jobs.db deploy/reports/ output/
          git commit -m "📋 Daily Job Report Update ($(date +'%Y-%m-%d'))" || echo "No changes to commit"
          git push origin main
