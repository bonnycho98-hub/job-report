name: 주간 채용공고 자동 크롤링

on:
  schedule:
    - cron: '0 14 * * 6'  # 토요일 23:00 KST (= 14:00 UTC)
  workflow_dispatch:       # GitHub Actions UI에서 수동 실행 가능

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Playwright Chromium 설치
        run: playwright install chromium --with-deps

      - name: 크롤링 실행
        id: crawl
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          OUTPUT=$(python3 scripts/crawl_job.py)
          echo "크롤링 결과: $OUTPUT"

          UNGKI=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('matched_summary',{}).get('웅키',0))")
          CHOKI=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('matched_summary',{}).get('쵸키',0))")
          SUCCESS=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success',0))")
          FAILED=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed',0))")
          RAW=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('raw_jobs',0))")

          echo "ungki=$UNGKI" >> $GITHUB_OUTPUT
          echo "choki=$CHOKI" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT
          echo "raw=$RAW" >> $GITHUB_OUTPUT

      - name: 텔레그램 알림 전송
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UNGKI: ${{ steps.crawl.outputs.ungki }}
          CHOKI: ${{ steps.crawl.outputs.choki }}
          SUCCESS: ${{ steps.crawl.outputs.success }}
          FAILED: ${{ steps.crawl.outputs.failed }}
          RAW: ${{ steps.crawl.outputs.raw }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python3 << 'EOF'
          import os, requests
          from datetime import datetime

          now = datetime.now()
          year, week = now.isocalendar()[:2]
          ok = os.environ.get('JOB_STATUS') == 'success'
          header = "완료" if ok else "실패 ⚠️"

          text = (
              f"📋 <b>{year}년 {week}주차 채용공고 크롤링 {header}</b>\n\n"
              f"✅ 성공: {os.environ.get('SUCCESS', '?')}개 사이트\n"
              f"❌ 실패: {os.environ.get('FAILED', '?')}개 사이트\n"
              f"📊 수집: {os.environ.get('RAW', '?')}건\n\n"
              f"🔍 매칭 결과:\n"
              f"👤 웅키: {os.environ.get('UNGKI', '?')}건\n"
              f"👤 쵸키: {os.environ.get('CHOKI', '?')}건"
          )

          keyboard = {"inline_keyboard": [[
              {"text": "📊 대시보드 열기", "url": "https://job-report-3bfg.onrender.com"}
          ]]}

          resp = requests.post(
              f"https://api.telegram.org/bot{os.environ['BOT_TOKEN']}/sendMessage",
              json={
                  "chat_id": os.environ['CHAT_ID'],
                  "text": text,
                  "parse_mode": "HTML",
                  "reply_markup": keyboard
              }
          )
          print(f"텔레그램 전송 결과: {resp.status_code}")
          EOF
