<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채용공고 크롤러 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">
    <nav class="bg-white shadow-sm p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                <i class="fa-solid fa-spider mr-2 text-blue-600"></i>Job Finder
            </h1>
            <div class="flex gap-4">
                <button onclick="switchTab('dashboard')" id="nav-dashboard"
                    class="text-blue-600 font-semibold focus:outline-none transition-colors">대시보드</button>
                <button onclick="switchTab('settings')" id="nav-settings"
                    class="text-gray-500 hover:text-gray-800 focus:outline-none transition-colors">설정/사이트 관리</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 mt-6" id="main-content">
        <!-- Dashboard View -->
        <div id="view-dashboard" class="animate-fade-in">
            <div class="flex justify-between items-end mb-6 bg-white p-6 rounded-xl shadow-sm">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 mb-2">이번 주 추천 공고</h2>
                    <p class="text-gray-500 text-sm">등록된 사이트를 순회하여 조건에 맞는 공고만 자동으로 필터링했습니다.</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="triggerCrawl()" id="btn-crawl"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-lg shadow-md transition-all font-medium flex items-center">
                        <i class="fa-solid fa-rotate mr-2"></i>크롤링 시작
                    </button>
                    <button onclick="exportHtml()" id="btn-export"
                        class="bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100 px-4 py-2.5 rounded-lg font-medium transition-all flex items-center">
                        <i class="fa-solid fa-download mr-2"></i>내보내기
                    </button>
                </div>
            </div>
            
            <!-- Site Summary Section -->
            <div id="site-summary" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 mb-8">
                <!-- Site stats cards will be injected here -->
            </div>


            <!-- Result Tabs -->
            <div class="mb-6 flex gap-2 border-b border-gray-200 pb-2">
                <button onclick="fetchResults('A')" id="tab-A"
                    class="px-6 py-2 rounded-t-lg bg-pink-50 text-pink-700 font-semibold border-b-2 border-pink-500 focus:outline-none transition-colors">프로필
                    A (마케팅)</button>
                <button onclick="fetchResults('B')" id="tab-B"
                    class="px-6 py-2 rounded-t-lg text-gray-500 hover:bg-gray-100 font-medium border-b-2 border-transparent focus:outline-none transition-colors">프로필
                    B (서비스 운영 기획)</button>
            </div>

            <!-- Loading Spinner -->
            <div id="loading" class="hidden flex justify-center py-12">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            </div>

            <!-- Results List -->
            <div id="results-list" class="flex flex-col gap-4">
                <!-- List items injected here -->
            </div>
        </div>

        <!-- Settings View -->
        <div id="view-settings" class="hidden animate-fade-in">
            <div class="bg-white p-6 rounded-xl shadow-sm mb-6">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-4">사이트 관리</h2>

                <form id="site-form"
                    class="mb-8 flex gap-4 items-end bg-gray-50 p-5 rounded-lg border border-gray-200 shadow-inner">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-700 mb-1 pl-1">사이트 이름</label>
                        <input type="text" id="site-name" required
                            class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow"
                            placeholder="예: 원티드 PM 공고 - 최신순">
                    </div>
                    <div class="flex-2 w-1/2">
                        <label class="block text-sm font-semibold text-gray-700 mb-1 pl-1">크롤링 타겟 URL</label>
                        <input type="url" id="site-url" required
                            class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition-shadow"
                            placeholder="https://...">
                    </div>
                    <button type="submit"
                        class="bg-gray-800 text-white px-6 py-2.5 rounded-md hover:bg-gray-700 transition shadow">URL
                        추가</button>
                </form>

                <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 rounded-lg">
                    <table class="min-w-full divide-y divide-gray-300">
                        <thead class="bg-gray-100">
                            <tr>
                                <th class="py-3.5 pl-4 pr-3 text-left text-sm font-bold text-gray-700">ID</th>
                                <th class="px-3 py-3.5 text-left text-sm font-bold text-gray-700">이름</th>
                                <th class="px-3 py-3.5 text-left text-sm font-bold text-gray-700">URL</th>
                                <th class="px-3 py-3.5 text-left text-sm font-bold text-gray-700">최근 상태</th>
                            </tr>
                        </thead>
                        <tbody id="sites-table-body" class="divide-y divide-gray-200 bg-white">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Notification Toast -->
    <div id="toast"
        class="fixed bottom-5 right-5 transform transition-all duration-300 translate-y-20 opacity-0 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 z-50">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="toast-message" class="font-medium">작업 완료</span>
    </div>

    <script src="/static/app.js"></script>
    <style>
        .animate-fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .line-clamp-2 {
            overflow: hidden;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 2;
            line-clamp: 2;
        }
    </style>
</body>

</html>
