<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    </style>
</head>

<body class="bg-[#F7F8FA] min-h-screen text-gray-900 antialiased">

    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-6 h-12 flex items-center justify-between">
            <span class="font-semibold text-sm tracking-tight">Job Finder</span>
            <div class="flex items-center h-full gap-1">
                <button onclick="switchTab('dashboard')" id="nav-dashboard"
                    class="h-full px-3 text-xs font-medium text-gray-900 border-b-2 border-gray-900 transition-colors focus:outline-none">대시보드</button>
                <button onclick="switchTab('settings')" id="nav-settings"
                    class="h-full px-3 text-xs font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors focus:outline-none">설정</button>
            </div>
        </div>
    </nav>

    <main id="main-content">

        <!-- ─── Dashboard View ─────────────────────────────────── -->
        <div id="view-dashboard">

            <!-- Top bar: site stats + action buttons (one line) -->
            <div class="bg-white border-b border-gray-100">
                <div class="max-w-4xl mx-auto px-6 py-2.5 flex items-center justify-between gap-4">
                    <div id="site-summary" class="flex flex-wrap gap-3 items-center min-h-[22px]"></div>
                    <div class="flex gap-2 shrink-0">
                        <button onclick="triggerCrawl()" id="btn-crawl"
                            class="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium px-3 py-1.5 rounded-md transition-colors">
                            <i class="fa-solid fa-rotate text-[10px]"></i>크롤링
                        </button>
                        <button onclick="exportHtml()" id="btn-export"
                            class="flex items-center gap-1.5 text-gray-500 hover:text-gray-700 text-xs font-medium px-3 py-1.5 rounded-md border border-gray-200 hover:border-gray-300 bg-white transition-colors">
                            <i class="fa-solid fa-download text-[10px]"></i>내보내기
                        </button>
                    </div>
                </div>
            </div>

            <!-- Profile tabs -->
            <div class="bg-white border-b border-gray-100">
                <div class="max-w-4xl mx-auto px-6 flex items-center h-10 gap-6">
                    <button onclick="fetchResults('A')" id="tab-A"
                        class="h-full text-xs font-semibold text-gray-900 border-b-2 border-gray-900 transition-colors focus:outline-none">마케팅</button>
                    <button onclick="fetchResults('B')" id="tab-B"
                        class="h-full text-xs font-medium text-gray-400 border-b-2 border-transparent hover:text-gray-600 transition-colors focus:outline-none">서비스 기획</button>
                </div>
            </div>

            <!-- Loading spinner -->
            <div id="loading" class="hidden flex justify-center py-16">
                <div class="animate-spin rounded-full h-5 w-5 border-2 border-gray-200 border-t-gray-500"></div>
            </div>

            <!-- Results list -->
            <div class="max-w-4xl mx-auto px-6 py-5">
                <div id="results-list" class="bg-white border border-gray-100 rounded-lg overflow-hidden"></div>
            </div>
        </div>

        <!-- ─── Settings View ──────────────────────────────────── -->
        <div id="view-settings" class="hidden">
            <div class="max-w-4xl mx-auto px-6 py-5 space-y-4">

                <!-- Add site form -->
                <div class="bg-white border border-gray-100 rounded-lg p-5">
                    <h2 class="text-sm font-semibold text-gray-900 mb-4">사이트 추가</h2>
                    <form id="site-form" class="flex flex-col sm:flex-row gap-3 items-end">
                        <div class="w-full sm:w-40 shrink-0">
                            <label class="block text-xs font-medium text-gray-500 mb-1.5">이름</label>
                            <input type="text" id="site-name" required placeholder="원티드 PM"
                                class="w-full text-sm border border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <div class="flex-1">
                            <label class="block text-xs font-medium text-gray-500 mb-1.5">크롤링 URL</label>
                            <input type="url" id="site-url" required placeholder="https://..."
                                class="w-full text-sm border border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                        </div>
                        <button type="submit"
                            class="bg-gray-900 hover:bg-gray-700 text-white text-xs font-medium px-4 py-2 rounded-md transition-colors whitespace-nowrap h-[38px]">추가</button>
                    </form>
                </div>

                <!-- Sites list -->
                <div class="bg-white border border-gray-100 rounded-lg overflow-hidden">
                    <div class="px-5 py-3.5 border-b border-gray-50">
                        <h2 class="text-sm font-semibold text-gray-900">등록된 사이트</h2>
                    </div>
                    <div id="sites-list"></div>
                </div>
            </div>
        </div>

    </main>

    <!-- Toast notification -->
    <div id="toast"
        class="fixed bottom-5 right-5 transform transition-all duration-200 translate-y-4 opacity-0 bg-gray-900 text-white text-xs px-4 py-2.5 rounded-lg shadow-lg flex items-center gap-2 z-50 pointer-events-none">
        <i class="fa-solid fa-circle-check text-green-400 text-xs"></i>
        <span id="toast-message"></span>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
